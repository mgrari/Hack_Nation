services:
  - type: web
    name: realdoor-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: FERNET_KEY
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false # fill in with the deployed Vercel URL, e.g. https://realdoor.vercel.app
      - key: ENVIRONMENT
        value: production # required so the session cookie uses Secure+SameSite=None for cross-domain auth
      - key: DATABASE_URL
        fromDatabase:
          name: realdoor-db
          property: connectionString

databases:
  - name: realdoor-db
    plan: free
